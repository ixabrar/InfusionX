<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#080C10"/>
  
  <!-- Outer Circle Border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00FF87" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#00FF87" stroke-width="1" opacity="0.4"/>
  
  <!-- Inner Arena Circle -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#00FF87" stroke-width="2"/>
  
  <!-- Top Arc (Arena shape) -->
  <path d="M 50 100 A 50 50 0 0 1 150 100" fill="none" stroke="#00FF87" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left Diagonal Line -->
  <line x1="60" y1="90" x2="85" y2="125" stroke="#00FF87" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Right Diagonal Line -->
  <line x1="140" y1="90" x2="115" y2="125" stroke="#00FF87" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center Point (Glow) -->
  <circle cx="100" cy="100" r="6" fill="#00FF87" opacity="0.9"/>
  <circle cx="100" cy="100" r="10" fill="none" stroke="#00FF87" stroke-width="1" opacity="0.3"/>
  
  <!-- Bottom Accent Lines -->
  <line x1="85" y1="125" x2="100" y2="140" stroke="#00FF87" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="125" x2="100" y2="140" stroke="#00FF87" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Decorative Corner Dots -->
  <circle cx="45" cy="55" r="3" fill="#00FF87" opacity="0.6"/>
  <circle cx="155" cy="55" r="3" fill="#00FF87" opacity="0.6"/>
  <circle cx="45" cy="145" r="3" fill="#00FF87" opacity="0.6"/>
  <circle cx="155" cy="145" r="3" fill="#00FF87" opacity="0.6"/>
</svg>